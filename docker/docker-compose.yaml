#-------------------------------------------------------------------------------
# CONFIG
#
x-config: &db-env
  POSTGRES_DB: ${POSTGRES_DB:-bob}
  POSTGRES_USER: ${POSTGRES_USER:-bob}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bob}

services:

  db:
    image: pgautoupgrade/pgautoupgrade:17-bookworm
    environment: *db-env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - db
    restart: unless-stopped

  bob:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      BOB_CONFIG_FILE: /config/config.yaml
    volumes:
      # config.yaml is never committed — place it at config/config.yaml on the host
      - ../config/config.yaml:/config/config.yaml:ro
      # store_path and temp_path resolve relative to /config/ automatically
      - ../config/store:/config/store
      - ../config/tmp:/config/tmp
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres-data:
