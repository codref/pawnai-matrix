name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required for setuptools-scm to derive the version
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # Trusted Publishing: no API token needed — configure this environment
    # on PyPI under your project's "Publishing" settings:
    #   Publisher: GitHub Actions
    #   Owner:     <your-github-org-or-user>
    #   Repo:      matrix-bob
    #   Workflow:  publish.yml
    #   Environment: pypi
    environment:
      name: pypi
      url: https://pypi.org/p/pawnai-matrix

    permissions:
      id-token: write  # required for OIDC Trusted Publishing

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
